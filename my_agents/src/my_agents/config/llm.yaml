provider: openrouter
model: openrouter/deepseek/deepseek-r1-0528
base_url: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY
temperature: 0.2
max_tokens: 12000
open_source_only: true
allow_closed_models: false
allowed_model_prefixes:
  - deepseek/
  - openrouter/deepseek/
  - meta-llama/
  - openrouter/meta-llama/
  - qwen/
  - openrouter/qwen/
  - gemma
  - openrouter/google/gemma
  - mistral/
  - openrouter/mistral/
  - mixtral
  - granite
  - phi-
  - falcon
  - olmo
  - nemotron
  - z-ai/
  - openrouter/z-ai/
  - xiaomi/
  - openrouter/xiaomi/
  - bytedance/
  - openrouter/bytedance/

# Model selection:
#
# Research agents (reasoning + tool use):
#   model: openrouter/deepseek/deepseek-r1-0528  (~$0.45/M input)
#
# Synthesis/thinking (strong writing + reasoning for report generation):
#   synthesis_model: openrouter/z-ai/glm-5  ($0.72/M input, near GPT-5.2 level)
#
# Evaluation (LLM-as-a-judge, structured JSON output):
#   eval_model: openrouter/qwen/qwen3.6-plus:free  (free tier)

synthesis_model: openrouter/z-ai/glm-5
eval_model: openrouter/qwen/qwen3.6-plus:free

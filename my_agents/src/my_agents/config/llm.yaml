provider: openrouter
model: openrouter/deepseek/deepseek-r1
base_url: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY
temperature: 0.2
max_tokens: 12000
open_source_only: true
allow_closed_models: false
allowed_model_prefixes:
  - deepseek/
  - openrouter/deepseek/
  - meta-llama/
  - openrouter/meta-llama/
  - qwen/
  - openrouter/qwen/
  - gemma
  - openrouter/google/gemma
  - mistral/
  - openrouter/mistral/
  - mixtral
  - granite
  - phi-
  - falcon
  - olmo
  - nemotron

# Model selection guide (OpenRouter, cheapest to best):
#
# Research agents (need reasoning + tool use):
#   - openrouter/deepseek/deepseek-r1       (best reasoning, very cheap ~$0.55/M input)
#   - openrouter/qwen/qwen3-235b-a22b       (strong structured output, cheap)
#   - openrouter/deepseek/deepseek-v3.2     (fast, cheaper, less reasoning)
#
# Evaluation model (LLM-as-a-judge):
#   - openrouter/meta-llama/llama-3.3-70b-instruct (reliable JSON, cheap)
eval_model: openrouter/meta-llama/llama-3.3-70b-instruct
